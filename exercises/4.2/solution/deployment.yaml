apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsweb
  namespace: net42
  labels:
    app: dnsweb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dnsweb
  template:
    metadata:
      labels:
        app: dnsweb
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.1
        ports:
        - containerPort: 80
