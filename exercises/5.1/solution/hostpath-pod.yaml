apiVersion: v1
kind: Pod
metadata:
  name: hostpath-pod
  namespace: vol-demo
spec:
  containers:
  - name: writer
    image: busybox:1.36
    command: ["sh", "-c", "echo 'on the node' > /host/marker.txt && sleep 3600"]
    volumeMounts:
    - name: host
      mountPath: /host
  volumes:
  - name: host
    hostPath:
      path: /tmp/ex51-host
      type: DirectoryOrCreate
