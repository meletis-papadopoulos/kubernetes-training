apiVersion: v1
kind: Pod
metadata:
  name: shared-vol
  namespace: vol-demo
spec:
  containers:
  - name: writer
    image: busybox:1.36
    command: ["sh", "-c", "echo 'written by writer' > /data/shared.txt && sleep 3600"]
    volumeMounts:
    - name: scratch
      mountPath: /data
  - name: reader
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: scratch
      mountPath: /data
  volumes:
  - name: scratch
    emptyDir: {}
