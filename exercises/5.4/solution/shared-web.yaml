apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-web
  namespace: wl-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-web
  template:
    metadata:
      labels:
        app: shared-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.1
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        persistentVolumeClaim:
          claimName: shared-pvc
