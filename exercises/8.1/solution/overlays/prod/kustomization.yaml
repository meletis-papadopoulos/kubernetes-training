apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod-app
resources:
- ../../base
labels:
- pairs:
    env: prod
  includeSelectors: false
replicas:
- name: web
  count: 3
images:
- name: nginx
  newTag: 1.27.2
configMapGenerator:
- name: web-config
  literals:
  - TIER=prod
