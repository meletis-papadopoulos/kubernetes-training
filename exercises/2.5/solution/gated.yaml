apiVersion: v1
kind: Pod
metadata:
  name: gated
  namespace: core
  labels:
    app: gated
spec:
  containers:
  - name: nginx
    image: nginx:1.27.1
    ports:
    - containerPort: 80
    readinessProbe:
      exec:
        command: ["cat", "/tmp/ready"]
      periodSeconds: 5
      failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: gated
  namespace: core
spec:
  selector:
    app: gated
  ports:
  - port: 80
    targetPort: 80
