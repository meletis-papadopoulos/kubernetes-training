apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ts95
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: ts95
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: ts95
  labels:
    app: dns-client
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
---
# Selects app=dns-client for Egress with NO egress rules => denies ALL outbound
# traffic from this Pod, including DNS queries (UDP/TCP 53) to CoreDNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dns-client-deny-egress
  namespace: ts95
spec:
  podSelector:
    matchLabels:
      app: dns-client
  policyTypes:
    - Egress
