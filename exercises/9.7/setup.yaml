apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: ts97
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: writer
  namespace: ts97
  labels:
    app: writer
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo ok > /data/health && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data
