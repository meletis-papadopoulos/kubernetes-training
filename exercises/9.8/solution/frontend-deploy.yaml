apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ts98
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.1
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: ts98
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
