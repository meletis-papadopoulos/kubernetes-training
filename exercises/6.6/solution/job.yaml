apiVersion: batch/v1
kind: Job
metadata:
  name: batch-worker
  namespace: batch
spec:
  completions: 4
  parallelism: 2
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: batch-worker
    spec:
      containers:
      - name: worker
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - 'echo "processed item on $(hostname)" && sleep 5'
      restartPolicy: Never
