apiVersion: batch/v1
kind: CronJob
metadata:
  name: heartbeat
  namespace: batch
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: heartbeat
        spec:
          containers:
          - name: beat
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - 'echo "heartbeat at $(date -u +%H:%M:%S)"'
          restartPolicy: OnFailure
