apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: ts911
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - "if [ -z \"$DATABASE_URL\" ]; then echo 'FATAL: DATABASE_URL is not set' >&2; exit 2; fi; echo \"connected to $DATABASE_URL\"; sleep 3600"
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
