apiVersion: v1
kind: Pod
metadata:
  name: cm-vol
  namespace: config-demo
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "cat /etc/appcfg/app.properties && sleep 3600"]
    volumeMounts:
    - name: cfg
      mountPath: /etc/appcfg
  volumes:
  - name: cfg
    configMap:
      name: app-config
  restartPolicy: Never
