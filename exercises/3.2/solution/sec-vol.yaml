apiVersion: v1
kind: Pod
metadata:
  name: sec-vol
  namespace: secret-demo
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "cat /etc/db/username && sleep 3600"]
    volumeMounts:
    - name: cred
      mountPath: /etc/db
      readOnly: true
  volumes:
  - name: cred
    secret:
      secretName: db-cred
  restartPolicy: Never
