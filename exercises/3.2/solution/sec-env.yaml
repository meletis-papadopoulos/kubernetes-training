apiVersion: v1
kind: Pod
metadata:
  name: sec-env
  namespace: secret-demo
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "echo user=$DB_USER && sleep 3600"]
    env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: db-cred
          key: username
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: db-cred
          key: password
  restartPolicy: Never
