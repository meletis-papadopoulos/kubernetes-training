apiVersion: v1
kind: Pod
metadata:
  name: shared-demo
  namespace: core
  labels:
    app: shared-demo
spec:
  volumes:
  - name: shared
    emptyDir: {}
  initContainers:
  # ordinary init container: runs to completion, seeds the shared volume
  - name: seed
    image: busybox:1.36
    command: ["sh", "-c", "echo \"seeded at $(date)\" > /shared/app.log"]
    volumeMounts:
    - name: shared
      mountPath: /shared
  # native sidecar: an init container with restartPolicy Always - starts before
  # the app and keeps running alongside it, streaming the shared file
  - name: streamer
    image: busybox:1.36
    restartPolicy: Always
    command: ["sh", "-c", "tail -f /shared/app.log"]
    volumeMounts:
    - name: shared
      mountPath: /shared
  containers:
  # main container: appends a timestamp to the shared file every 5s
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "while true; do date >> /shared/app.log; sleep 5; done"]
    volumeMounts:
    - name: shared
      mountPath: /shared
