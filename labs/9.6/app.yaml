apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-svc
  namespace: training
spec:
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 80
