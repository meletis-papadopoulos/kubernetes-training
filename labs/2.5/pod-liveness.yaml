apiVersion: v1
kind: Pod
metadata:
  name: liveness-http
  namespace: training
  labels:
    app: liveness-test
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
