apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  namespace: training
  labels:
    app: init-demo
spec:
  volumes:
    - name: work
      emptyDir: {}
  # init container runs to completion BEFORE any app container starts
  initContainers:
    - name: setup
      image: busybox:1.36
      command: ["sh", "-c", "echo 'prepared by the init container' > /work/index.html"]
      volumeMounts:
        - name: work
          mountPath: /work
  containers:
    # app container serves the file the init container prepared
    - name: web
      image: nginx:1.25
      volumeMounts:
        - name: work
          mountPath: /usr/share/nginx/html
      ports:
        - containerPort: 80
