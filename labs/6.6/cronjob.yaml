apiVersion: batch/v1
kind: CronJob
metadata:
  name: date-printer
  namespace: training
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: date-printer
        spec:
          containers:
            - name: date
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - 'echo "Current date: $(date)"'
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
