apiVersion: v1
kind: Pod
metadata:
  name: pod-configmap-env
  namespace: training
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo APP_ENV=$APP_ENV LOG_LEVEL=$LOG_LEVEL && sleep 3600"]
      envFrom:
        - configMapRef:
            name: app-config-literal
  restartPolicy: Never
