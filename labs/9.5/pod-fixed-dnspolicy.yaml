# Same pod, dnsPolicy field simply omitted - the real Kubernetes default,
# ClusterFirst, applies: queries go to CoreDNS, with the training namespace's
# search domains appended for short names.
apiVersion: v1
kind: Pod
metadata:
  name: dns-wrong-policy
  namespace: training
  labels:
    app: dns-wrong-policy
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
