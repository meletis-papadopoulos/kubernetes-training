# dnsPolicy: Default is a misleading name - it does NOT mean "the Kubernetes
# default" (that's ClusterFirst). It means "inherit the NODE's own
# /etc/resolv.conf", bypassing CoreDNS entirely. A pod with this setting
# cannot resolve any in-cluster Service name.
apiVersion: v1
kind: Pod
metadata:
  name: dns-wrong-policy
  namespace: training
  labels:
    app: dns-wrong-policy
spec:
  dnsPolicy: Default
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
