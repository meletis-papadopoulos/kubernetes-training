apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-target
  namespace: training
  labels:
    app: dns-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-target
  template:
    metadata:
      labels:
        app: dns-target
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dns-target-svc
  namespace: training
spec:
  selector:
    app: dns-target
  ports:
    - port: 80
      targetPort: 80
