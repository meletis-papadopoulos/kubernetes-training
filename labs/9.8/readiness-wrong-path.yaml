apiVersion: apps/v1
kind: Deployment
metadata:
  name: silent-app
  namespace: training
spec:
  replicas: 2
  selector:
    matchLabels:
      app: silent-app
  template:
    metadata:
      labels:
        app: silent-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: silent-app-svc
  namespace: training
spec:
  selector:
    app: silent-app
  ports:
    - port: 80
      targetPort: 80
