apiVersion: v1
kind: Pod
metadata:
  name: wrong-port-pod
  namespace: training
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 2
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
