apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-apache
  namespace: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-apache
  template:
    metadata:
      labels:
        app: php-apache
    spec:
      containers:
        - name: php-apache
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: php-apache
  namespace: training
spec:
  selector:
    app: php-apache
  ports:
    - port: 80
      targetPort: 80
