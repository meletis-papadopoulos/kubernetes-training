apiVersion: v1
kind: Pod
metadata:
  name: hostpath-pod
  namespace: training
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - "echo 'Written by hostPath pod' > /host-data/test.txt && sleep 3600"
      volumeMounts:
        - name: host-volume
          mountPath: /host-data
  volumes:
    - name: host-volume
      hostPath:
        path: /tmp/k8s-lab-data
        type: DirectoryOrCreate
