apiVersion: v1
kind: Pod
metadata:
  name: load-generator
  namespace: training
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - "while true; do wget -q -O- http://hpa-nginx-svc.training.svc.cluster.local; done"
  restartPolicy: Never
