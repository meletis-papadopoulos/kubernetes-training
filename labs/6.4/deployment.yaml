apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-nginx
  namespace: training
  labels:
    app: hpa-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hpa-nginx
  template:
    metadata:
      labels:
        app: hpa-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
