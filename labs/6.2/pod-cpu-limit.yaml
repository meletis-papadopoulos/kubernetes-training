apiVersion: v1
kind: Pod
metadata:
  name: cpu-limit-demo
  namespace: training
spec:
  containers:
    - name: cpu-hog
      image: polinux/stress
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      command: ["stress"]
      args: ["--cpu", "2", "--timeout", "300s"]
