apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-logger
  namespace: training
  labels:
    app: node-logger
spec:
  selector:
    matchLabels:
      app: node-logger
  template:
    metadata:
      labels:
        app: node-logger
    spec:
      containers:
        - name: logger
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - "while true; do echo \"$(date) - Running on node: $(hostname)\"; sleep 5; done"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
