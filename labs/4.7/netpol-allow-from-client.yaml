# Additive: allow inbound to web ONLY from pods labelled app=client-allowed, on TCP 80.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-allow-from-client
  namespace: training
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: client-allowed
      ports:
        - protocol: TCP
          port: 80
